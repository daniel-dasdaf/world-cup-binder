<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PANINI TRACKER</title>
    <link rel="stylesheet" href="./assets/reset.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="./assets/main.css">
</head>
<body>
    <h1 class="text-center">World Cup 2026 Binder</h1>
    <div class="p-[10px]">
        <input class="border-2 border-[#e2e2e2] p-[10px] rounded-xl w-full mb-[10px]" id="searchInput" placeholder="Search sticker (e.g. MEX1)" />
        <div class="text-center" id="searchResult"></div>
    </div>
    <div class="p-[10px]">
        <button  class="text-center w-full p-[10px] bg-[#e2e2e2] rounded-xl" id="missingBtn" class="">Show Missing</button>
    </div>

    
    <div id="app"></div>

    <script src="./assets/app.js"></script>

    <div id="modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center">
        <div class="bg-white w-[400px] max-h-[80vh] overflow-auto p-4 rounded-lg relative">
            
            <button id="closeModal" class="absolute top-2 right-2 font-bold">
            ✕
            </button>

            <h2 class="text-xl font-bold mb-3">Missing Stickers</h2>

            <div id="modalContent"></div>
        </div>
    </div>

    <script>

        const input = document.getElementById("searchInput");
        const result = document.getElementById("searchResult");

        input.addEventListener("input", () => {
            const value = input.value;

            if (!value) {
                result.innerHTML = "";
                return;
            }

            const found = findStickerByCode(value);

            if (!found) {
                result.innerHTML = "Not found";
                return;
            }

            if (found.type === "fwc") {
                result.innerHTML = `
                🏆 FWC: ${found.name} <br/>
                ${found.owned ? "Owned" : "Missing"}
                `;
            } else {
                result.innerHTML = `
                ${found.team} (${found.code})<br/>
                ${found.name} <br/>
                ${found.owned ? "✅ Owned" : "❌ Missing"}
                `;
            }
        });

        const modal = document.getElementById("modal");
        const modalContent = document.getElementById("modalContent");
        const closeModal = document.getElementById("closeModal");
        const missingBtn = document.getElementById("missingBtn");

        missingBtn.addEventListener("click", () => {
            const missing = getMissingStickers(binder);

            if (missing.length === 0) {
                modalContent.innerHTML = "🎉 You completed everything!";
            } else {
                modalContent.innerHTML = missing.map(item => `
                <div class="border p-2 rounded mb-2">
                    <strong>${item.code}</strong> - ${item.name}<br/>
                    <small>${item.type}</small>
                </div>
                `).join("");
            }

            modal.classList.remove("hidden");
        });
        
        closeModal.addEventListener("click", () => {
            modal.classList.add("hidden");
        });
        modal.addEventListener("click", (e) => {
            if (e.target === modal) {
                modal.classList.add("hidden");
            }
        });
    </script>
</body>
</html>
