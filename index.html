<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PANINI TRACKER</title>
    <link rel="stylesheet" href="./assets/reset.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="./assets/main.css">
</head>
<body>
    <h1 class="text-center">World Cup 2026 Binder</h1>
    <div class="p-[10px]">
        <input class="border-2 border-[#e2e2e2] p-[10px] rounded-xl w-full mb-[10px]" id="searchInput" placeholder="Search sticker (e.g. MEX1)" />
        <div class="text-center" id="searchResult"></div>
    </div>
    <div class="p-[10px] flex flex-row gap-[10px]">
        <button  class="text-center w-full p-[10px] bg-[#e2e2e2] rounded-xl" id="missingBtn">Show Missing</button>
        <button  class="text-center w-full max-w-[100px] p-[10px] bg-[green] text-white rounded-xl" id="openAddPopup">Add</button>
    </div>

    
    <div id="app"></div>

    <script src="./assets/app.js"></script>

    <div id="modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center">
        <div class="bg-white w-[400px] max-h-[80vh] overflow-auto p-4 rounded-lg relative">
            
            <button id="closeModal" class="absolute top-2 right-2 font-bold">
            ✕
            </button>

            <h2 class="text-xl font-bold mb-3">Missing Stickers</h2>

            <div id="modalContent" class="flex flex-wrap gap-[10px]"></div>
        </div>
    </div>
    <div id="popup" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center">
        <div class="bg-white p-4 rounded w-[300px] flex flex-col gap-[5px]">
            
            <input id="stickerInput" placeholder="e.g. MEX1" class="border-2 border-[#e2e2e2] p-[10px] rounded-xl w-full mb-[15px]" />

            <button id="addStickerBtn" class="w-full border p-2 rounded-xl"> Add </button>

            <button id="closePopup" class="w-full mt-2 text-sm"> Close </button>

        </div>
    </div>

    <script>

        const input = document.getElementById("searchInput");
        const result = document.getElementById("searchResult");

        input.addEventListener("input", () => {
            const value = input.value;

            if (!value) {
                result.innerHTML = "";
                return;
            }

            const found = findStickerByCode(value);

            if (!found || !found.sticker) {
                result.innerHTML = "Not found";
                return;
            }

            result.innerHTML = `
                ${found.sticker.owned ? "✅ Owned" : "❌ Missing"}
                `;
        });

        const modal = document.getElementById("modal");
        const modalContent = document.getElementById("modalContent");
        const closeModal = document.getElementById("closeModal");
        const missingBtn = document.getElementById("missingBtn");

        missingBtn.addEventListener("click", () => {
            const missing = getMissingStickers(binder);

            if (missing.length === 0) {
                modalContent.innerHTML = "🎉 You completed everything!";
            } else {
                modalContent.innerHTML = missing.map(item => `
                <div class="flex-1 border p-2 rounded mb-2">
                    <strong>${item.code}</strong><br/>
                </div>
                `).join("");
            }

            modal.classList.remove("hidden");
        });
        
        closeModal.addEventListener("click", () => {
            modal.classList.add("hidden");
        });
        modal.addEventListener("click", (e) => {
            if (e.target === modal) {
                modal.classList.add("hidden");
            }
        });

        const popup = document.getElementById("popup");
        const openBtn = document.getElementById("openAddPopup");
        const closeBtn = document.getElementById("closePopup");

        openBtn.addEventListener("click", () => {
            popup.classList.remove("hidden");
        });

        closeBtn.addEventListener("click", () => {
            popup.classList.add("hidden");
        });

        const stickerInput = document.getElementById("stickerInput");
        const addBtn = document.getElementById("addStickerBtn");

        addBtn.addEventListener("click", () => {
            const code = stickerInput.value;
            const result = findStickerByCode(code);
            
            console.log(result)
            if (!result || !result.sticker) {
                alert("Sticker not found: " + code);
                return;
            }
            result.sticker.owned = true;

            saveState(buildState(binder));

            popup.classList.add("hidden");
            stickerInput.value = "";

            renderBinder();
        });
    </script>
</body>
</html>
